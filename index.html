<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Digital Keepsake | Birthday Surprise Creator</title>
    <!-- Stitch Tailwind Config -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#913e6c",
                        "primary-fixed": "#ff99cc",
                        "surface": "#faf4fc",
                        "on-surface": "#302e34",
                        "on-surface-variant": "#5d5a61",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-mesh font-body text-on-surface min-h-screen relative overflow-hidden">
    <!-- Animated background particles will be injected by JS/CSS here -->
    <div id="particles-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <!-- Floating Photo Previews Container (Background Layer) -->
    <div id="preview-container" class="fixed inset-0 pointer-events-none z-10 hidden sm:block"></div>

    <main class="relative z-20 flex flex-col items-center justify-center min-h-screen p-6">
        
        <section class="text-center mb-10 fade-in-up slide-up">
            <h2 class="font-headline text-5xl md:text-6xl font-bold tracking-tight mb-4 drop-shadow-md text-white">
                Create a <span class="text-primary italic animate-glow drop-shadow-[0_0_20px_#ff99cc]">Moment</span> ✨
            </h2>
            <p class="text-gray-800 font-medium text-lg bg-white/40 px-6 py-2 rounded-full backdrop-blur-sm inline-block shadow-sm">
                Turn your memories into a magical digital surprise.
            </p>
        </section>

        <!-- Glassmorphism Creator Card -->
        <div class="glass-card slide-up w-full max-w-xl rounded-[2rem] p-8 md:p-12 bloom-shadow border border-white/60 group/card relative">
            <!-- Animated Glowing Border -->
            <div class="absolute inset-0 rounded-[2rem] opacity-0 group-hover/card:opacity-100 transition-opacity duration-700 pointer-events-none border-glow-anim z-0"></div>
            
            <form id="creator-form" class="relative z-10 space-y-8">
                
                <!-- Name Input -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-primary ml-2 uppercase tracking-widest drop-shadow-[0_2px_4px_white]">The Guest of Honor</label>
                    <div class="relative group">
                        <input id="name" required class="w-full bg-white/70 backdrop-blur-xl border-2 border-white/50 rounded-2xl px-6 py-5 text-xl font-headline focus:ring-4 focus:ring-primary-fixed focus:border-white transition-all outline-none placeholder:text-slate-400 placeholder-shimmer shadow-inner text-gray-800 font-bold" placeholder="E.g. Sweetheart" type="text"/>
                    </div>
                </div>

                <!-- Wish Message -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-primary ml-2 uppercase tracking-widest drop-shadow-[0_2px_4px_white]">Your Special Message (Optional)</label>
                    <div class="relative group">
                        <textarea id="message" rows="3" class="w-full bg-white/70 backdrop-blur-xl border-2 border-white/50 rounded-2xl px-6 py-4 text-lg font-headline focus:ring-4 focus:ring-primary-fixed focus:border-white transition-all outline-none placeholder:text-slate-400 placeholder-shimmer shadow-inner text-gray-800 font-medium resize-none shadow-sm" placeholder="Write something beautiful..."></textarea>
                    </div>
                </div>

                <!-- Photos Upload -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-primary ml-2 uppercase tracking-widest drop-shadow-[0_2px_4px_white]">Add Memories (Max 10)</label>
                    <div class="relative group cursor-pointer">
                        <input id="photos" type="file" multiple accept="image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" />
                        <div class="w-full bg-white/50 backdrop-blur-xl border-2 border-dashed border-primary/50 rounded-2xl px-6 py-10 flex flex-col items-center justify-center transition-all group-hover:border-primary group-hover:bg-white/80 group-hover:scale-[1.02] shadow-sm">
                            <span class="material-symbols-outlined text-5xl text-primary mb-3">add_a_photo</span>
                            <span class="font-bold text-gray-700 text-lg">Tap to select photos</span>
                        </div>
                    </div>
                    <!-- Mobile inline preview (since floating might fall offscreen) -->
                    <div id="mobile-preview" class="flex sm:hidden gap-3 overflow-x-auto py-2 px-1"></div>
                </div>

                <div id="loading" class="hidden text-center scale-up">
                    <div class="spinner-magical mx-auto"></div>
                    <p class="text-primary font-bold mt-4 animate-pulse">Weaving magic...</p>
                </div>

                <button type="submit" id="submit-btn" class="jelly-btn w-full py-5 bg-gradient-to-r from-primary to-primary-fixed text-white font-headline font-extrabold text-xl rounded-full shadow-xl shadow-pink-300 hover:shadow-[0_10px_30px_rgba(255,153,204,0.8)] transition-all flex items-center justify-center gap-3 mt-6 border border-white/30">
                    <span class="material-symbols-outlined text-2xl">magic_button</span>
                    Craft Surprise Link
                </button>

            </form>

            <div id="success-popup" class="hidden absolute inset-0 bg-white/90 backdrop-blur-2xl rounded-[2rem] flex flex-col items-center justify-center p-8 text-center z-50 scale-up">
                <span class="text-6xl mb-4 animate-bounce">🎁</span>
                <h2 class="font-headline text-4xl text-primary font-extrabold mb-3">Magic Ready!</h2>
                <p class="text-gray-700 font-medium mb-6">Your unique shareable link has been crafted.</p>
                <div class="w-full flex gap-3 flex-col md:flex-row">
                    <input id="share-link" type="text" readonly class="flex-1 bg-white border-2 border-primary/30 rounded-xl px-4 py-4 outline-none font-bold text-gray-600 shadow-inner text-sm" />
                    <button id="copy-btn" class="bg-primary text-white px-8 py-4 rounded-xl font-bold hover:bg-pink-700 transition-colors jelly-btn shadow-lg whitespace-nowrap">Copy Link</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js" defer></script>
</body>
</html>
