<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Birthday Surprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="creator-container">
        <h1>Create a magical surprise ✨</h1>
        <p>Make a beautiful, animated birthday memory for someone special.</p>
        
        <form id="creator-form">
            <div class="input-group">
                <label for="name">Birthday Person Name</label>
                <input type="text" id="name" required placeholder="E.g. Sweetheart" maxlength="30">
            </div>
            
            <div class="input-group">
                <label for="photos">Upload Memories (Max 10)</label>
                <input type="file" id="photos" accept="image/*" multiple required>
                <div class="preview-container" id="preview-container"></div>
            </div>
            
            <button type="submit" id="submit-btn" class="magical-btn">Create Surprise Link</button>
        </form>

        <div id="loading" class="hidden" style="text-align: center; margin-top: 20px;">
            <div class="spinner"></div>
            <p style="color: var(--primary); font-weight: bold;">Creating magic... Please wait.</p>
        </div>

        <div id="success-popup" class="hidden popup">
            <div class="popup-content">
                <h2 style="color: var(--primary);">✨ Surprise Created! ✨</h2>
                <p>Your unique shareable link is ready.</p>
                <div class="link-container">
                    <input type="text" id="share-link" readonly>
                    <button id="copy-btn">Copy Link</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
