<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>A Special Surprise for You</title>
    <!-- Stitch Tailwind Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = { theme: { extend: { colors: { "primary": "#913e6c", "primary-fixed": "#ff99cc" } } } }
    </script>
</head>

<body
    class="bg-mesh font-['Plus_Jakarta_Sans'] text-white min-h-[100dvh] w-full relative overflow-x-hidden overflow-y-auto viewer-body">

    <!-- Cinematic Lighting Overlays -->
    <div class="ambient-light pointer-events-none fixed inset-0 z-0"></div>
    <div class="vignette-overlay pointer-events-none fixed inset-0 z-50"></div>

    <button id="music-btn"
        class="fixed bottom-4 right-4 sm:bottom-8 sm:right-8 bg-white/30 backdrop-blur-xl border border-white/50 px-4 py-3 sm:px-6 sm:py-4 rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.2)] z-50 hover:bg-white/50 hover:scale-105 active:scale-95 transition-all font-bold tracking-wide flex items-center gap-2 sm:gap-3 text-white text-sm sm:text-lg">
        ♪ Play Music
    </button>
    <audio id="bg-music" loop>
        <source src="" type="audio/mpeg">
    </audio>

    <div id="loader"
        class="absolute inset-0 flex flex-col items-center justify-center z-40 bg-black/30 backdrop-blur-md text-center px-4">
        <div class="heart-pulse text-6xl sm:text-8xl drop-shadow-2xl">💖</div>
        <p class="mt-6 font-bold text-xl sm:text-2xl animate-pulse tracking-wide drop-shadow-lg">Opening your
            surprise...</p>
    </div>

    <!-- Error Screen -->
    <div id="error-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center z-40 bg-black/90">
        <h2 class="text-6xl font-bold text-red-400 mb-4 font-['Dancing_Script']">Oops!</h2>
        <p class="text-xl">The magic link seems broken or incomplete.</p>
    </div>

    <!-- Main Experience Trigger -->
    <div id="experience"
        class="hidden min-h-[100dvh] w-full relative flex flex-col items-center justify-center z-10 p-4 sm:p-6 pointer-events-none pb-20">

        <h1 id="intro-title-group"
            class="font-['Dancing_Script'] text-5xl sm:text-7xl md:text-9xl text-center drop-shadow-[0_10px_30px_rgba(255,153,204,1)] leading-tight w-full px-2 opacity-0 filter blur-sm transform scale-95">
            Happy <span id="occasion-text">Birthday</span>,<br>
            <span id="bday-name"
                class="text-white drop-shadow-[0_0_40px_rgba(255,255,255,1)] break-words w-full inline-block">Name</span>!
        </h1>

        <button id="preview-animation-btn"
            class="mt-10 sm:mt-16 pointer-events-auto jelly-btn bg-gradient-to-r from-primary to-primary-fixed hover:from-pink-600 hover:to-pink-400 backdrop-blur-2xl border-2 border-white/80 px-8 py-4 sm:px-12 sm:py-6 rounded-full text-lg sm:text-2xl font-extrabold shadow-[0_10px_30px_rgba(255,153,204,0.8)] sm:shadow-[0_15px_50px_rgba(255,153,204,0.8)] transition-all animate-pulse-gentle flex items-center justify-center gap-2 sm:gap-3 text-white shimmer-btn magic-btn-hover premium-floating z-50">
            <span class="animate-bounce">✨</span> Start The Magic <span class="animate-bounce"
                style="animation-delay: 0.5s">✨</span>
        </button>

        <div
            class="mt-8 flex flex-col items-center gap-1.5 px-8 py-5 bg-white/20 backdrop-blur-2xl border border-white/50 animate-[pulse_3s_ease-in-out_infinite] shadow-[0_10px_30px_rgba(255,105,180,0.3)] pointer-events-auto shape-blob relative group premium-floating">
            <span
                class="text-white font-bold tracking-widest text-xs sm:text-sm uppercase text-center premium-text-glow z-10">
                Touch the hearts first!
            </span>
            <span
                class="material-symbols-outlined text-white text-3xl animate-bounce pointer-events-none drop-shadow-md z-10 mt-1">touch_app</span>
        </div>
    </div>

    <!-- Floating Interactive Hearts Container -->
    <div id="hearts-container" class="absolute inset-0 pointer-events-none z-20 overflow-hidden"></div>
    <div id="particles-container" class="absolute inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <!-- Heart Click Photo Frame -->
    <div id="photo-frame-popup"
        class="hidden fixed inset-0 flex items-center justify-center z-50 bg-black/30 backdrop-blur-[2px] pointer-events-none transition-opacity duration-300 p-4">
        <!-- Inner Entrance Container -->
        <div id="photo-popup-inner" class="relative max-w-full origin-center pointer-events-none">
            <!-- Floating Container with Drop Shadow Glow -->
            <div class="w-64 h-64 sm:w-80 sm:h-80 mx-auto premium-floating filter drop-shadow-[0_0_30px_rgba(255,153,204,0.6)]">
                <!-- Borderless organic image -->
                <img id="frame-image" src="" alt="Memory" class="w-full h-full object-cover shape-blob">
            </div>
        </div>
    </div>

    <!-- Ultra Attractive Slideshow -->
    <div id="slideshow-overlay"
        class="hidden fixed inset-0 z-[100] bg-black/70 backdrop-blur-3xl overflow-hidden pointer-events-auto">
        <div id="slideshow-image-container"
            class="w-full h-full relative flex items-center justify-center perspective-1000"></div>
    </div>

    <!-- Final Message & Custom Wish -->
    <!-- Changed from fixed overlay to relative flexible min-h container for natural scrolling -->
    <div id="final-screen"
        class="hidden relative w-full min-h-[100dvh] z-[200] flex flex-col items-center justify-center bg-black/60 backdrop-blur-2xl px-6 py-12 md:py-20 auto-rows-max">
        <h1
            class="font-['Dancing_Script'] text-[4rem] sm:text-[5rem] md:text-[7rem] premium-text-glow premium-floating text-center leading-tight mb-8">
            You are not just important in my life…<br>you are truly unforgettable.❤️
        </h1>

        <!-- Custom Message Card -->
        <div id="custom-message-card"
            class="hidden w-[95%] sm:w-full max-w-2xl bg-white/10 backdrop-blur-3xl border border-white/40 p-10 sm:p-14 shape-blob shadow-[0_10px_30px_rgba(255,153,204,0.3)] sm:shadow-[0_20px_50px_rgba(255,153,204,0.5)] animate-message-entrance relative overflow-hidden group mx-auto premium-floating">
            <!-- Glowing pastel border effect -->
            <div class="absolute inset-0 border-glow-anim opacity-50 z-0"></div>
            <!-- Floating mini hearts around message -->
            <div
                class="absolute top-2 left-4 sm:left-6 text-pink-300 animate-float-text text-xl sm:text-2xl drop-shadow-[0_0_10px_#ff99cc]">
                💖</div>
            <div class="absolute bottom-4 sm:bottom-6 right-4 sm:right-8 text-purple-300 animate-float-text text-lg sm:text-xl drop-shadow-[0_0_10px_#ddc8ff]"
                style="animation-delay: 1.5s;">✨</div>

            <p id="custom-message-text"
                class="relative z-10 text-center font-['Dancing_Script'] text-2xl sm:text-3xl md:text-5xl bg-gradient-to-r from-pink-300 via-purple-300 to-orange-200 bg-clip-text text-transparent drop-shadow-[0_0_10px_rgba(255,153,204,0.6)] animate-text-reveal leading-relaxed break-words">
            </p>
        </div>

        <div class="mt-12 flex flex-col sm:flex-row items-center gap-4 sm:gap-6 z-[200]">
            <button id="watch-again-btn"
                class="jelly-btn bg-white/20 hover:bg-white/40 backdrop-blur-2xl border-2 border-white px-8 py-4 sm:px-12 sm:py-5 rounded-full text-lg sm:text-xl font-bold shadow-[0_0_30px_rgba(255,153,204,0.6)] sm:shadow-[0_0_50px_rgba(255,153,204,0.6)] transition-all animate-pulse-gentle flex items-center justify-center gap-2 sm:gap-3 text-white w-full sm:w-auto">
                Watch Again ❤️
            </button>
            <a href="index.html" id="create-own-btn"
                class="jelly-btn bg-gradient-to-r from-primary to-primary-fixed hover:from-pink-600 hover:to-pink-400 backdrop-blur-2xl border-2 border-white/80 px-8 py-4 sm:px-12 sm:py-5 rounded-full text-lg sm:text-xl font-bold shadow-[0_15px_50px_rgba(255,153,204,0.8)] transition-all shimmer-btn magic-btn-hover flex items-center justify-center gap-2 sm:gap-3 text-white w-full sm:w-auto">
                Create Your Own ✨
            </a>
        </div>

        <div id="confetti-container" class="absolute inset-0 pointer-events-none z-0 overflow-hidden"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js" defer></script>
</body>

</html>
