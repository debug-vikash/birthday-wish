<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - DilSeSurprise</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = { theme: { extend: { colors: { "primary": "#913e6c", "primary-fixed": "#ff99cc" }, fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Be Vietnam Pro"] } } } }
    </script>
</head>
<body class="bg-mesh font-body text-gray-800 min-h-[100dvh] flex items-center justify-center p-4">
    <div id="particles-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>
    
    <main class="w-full max-w-md z-10 glass-card rounded-[2rem] p-8 sm:p-10 border border-white/60 shadow-2xl relative fade-in-up slide-up">
        <div class="text-center mb-8">
            <span class="text-5xl mb-4 inline-block animate-bounce">💖</span>
            <h1 class="font-headline text-3xl font-extrabold text-primary mb-2">Welcome Back</h1>
            <p class="text-sm font-bold text-gray-600">Login to Create Surprise ❤️</p>
        </div>
        
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-primary ml-2 mb-1 uppercase tracking-widest">Email Address</label>
                <input type="email" id="login-email" required class="w-full bg-white/70 backdrop-blur-xl border-2 border-white/50 rounded-xl px-4 py-3 text-lg font-headline focus:ring-4 focus:ring-primary-fixed focus:border-white transition-all outline-none font-bold" placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-primary ml-2 mb-1 uppercase tracking-widest">Password</label>
                <input type="password" id="login-password" required class="w-full bg-white/70 backdrop-blur-xl border-2 border-white/50 rounded-xl px-4 py-3 text-lg font-headline focus:ring-4 focus:ring-primary-fixed focus:border-white transition-all outline-none font-bold" placeholder="••••••••">
            </div>
            
            <div id="login-error" class="hidden text-sm font-bold text-red-500 text-center bg-red-100/80 p-2 rounded-lg scale-up"></div>
            
            <button type="submit" id="login-btn" class="w-full py-4 bg-gradient-to-r from-primary to-primary-fixed text-white font-headline font-extrabold text-lg rounded-full shadow-lg hover:shadow-[0_10px_30px_rgba(255,153,204,0.8)] transition-all jelly-btn mt-4 flex items-center justify-center gap-2">
                <span>Login</span>
                <div id="login-spinner" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm font-bold text-gray-600">
            Don't have an account? <a href="register.html" class="text-primary hover:text-pink-600 underline decoration-2 underline-offset-2 transition-colors">Sign up here</a>
        </p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js" defer></script>
</body>
</html>
