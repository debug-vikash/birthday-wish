# Render Blueprint - Birthday Wish Static Site
# Deploy: Push to Git, then connect this repo in Render Dashboard
# Or use "New > Static Site" and connect your repo

services:
  - type: web
    name: birthday-wish
    runtime: static

    # No build step - pure HTML/CSS/JS
    buildCommand: echo "No build required"

    # Publish from repo root (index.html, style.css, script.js)
    staticPublishPath: .
